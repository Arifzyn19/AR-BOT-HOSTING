version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: bot-hosting-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bot_hosting
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - bot-hosting-network

  redis:
    image: redis:7-alpine
    container_name: bot-hosting-redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    networks:
      - bot-hosting-network

  backend:
    build:
      context: ..
      dockerfile: docker/backend.Dockerfile
    container_name: bot-hosting-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/bot_hosting
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: your-secret-key-change-in-production
      PORT: 3001
      NODE_ENV: development
    ports:
      - '3001:3001'
    depends_on:
      - postgres
      - redis
    volumes:
      - ../apps/backend:/app/apps/backend
      - /app/node_modules
      - /app/apps/backend/node_modules
    networks:
      - bot-hosting-network
    command: pnpm --filter @bot-hosting/backend dev

  frontend:
    build:
      context: ..
      dockerfile: docker/frontend.Dockerfile
    container_name: bot-hosting-frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api/v1
      NEXT_PUBLIC_WS_URL: ws://localhost:3001
    ports:
      - '3000:3000'
    depends_on:
      - backend
    volumes:
      - ../apps/frontend:/app/apps/frontend
      - /app/node_modules
      - /app/apps/frontend/node_modules
      - /app/apps/frontend/.next
    networks:
      - bot-hosting-network
    command: pnpm --filter @bot-hosting/frontend dev

volumes:
  postgres_data:
  redis_data:

networks:
  bot-hosting-network:
    driver: bridge
